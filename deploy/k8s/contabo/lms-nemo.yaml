        - name: COMPLIANCE_SERVICE_URL
          value: "http://compliance-service:8094"
        - name: MEDIA_SERVICE_URL
          value: "http://media-service:8098"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://bff-notification:8111"
        - name: LMS_CORS_ALLOWED_ORIGINS
          value: "https://app.lms.athenafinance.cloud"
