  labels: {app: lms-api-gateway}
spec:
  selector: {app: lms-api-gateway}
  ports:
  - port: 8105
    targetPort: 8105

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-service
  namespace: lms
  labels: {app: decision-service}
spec:
  replicas: 1
  selector:
    matchLabels: {app: decision-service}
  template:
    metadata:
      labels: {app: decision-service}
    spec:
      containers:
      - name: decision-service
        image: nemo-decision-service:2026.07.18
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef: {name: lms-go-common}
        - secretRef: {name: lms-secrets}
        env:
        - name: PORT
          value: "8106"
        - name: SERVICE_NAME
          value: "decision-service"
        - name: DB_NAME
          value: "athena_decision"
        ports:
        - containerPort: 8106
        readinessProbe:
          httpGet: {path: /actuator/health, port: 8106}
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 3
        livenessProbe:
          httpGet: {path: /actuator/health, port: 8106}
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests: {cpu: 100m, memory: 128Mi}
          limits: {cpu: 500m, memory: 512Mi}

---
apiVersion: v1
kind: Service
metadata:
  name: decision-service
  namespace: lms
  labels: {app: decision-service}
spec:
  selector: {app: decision-service}
  ports:
  - port: 8106
    targetPort: 8106

