# PRODUCTION SECRETS TEMPLATE — addresses CRIT-3 (secrets in plaintext ConfigMap).
#
# DO NOT COMMIT REAL VALUES. Copy to lms-secrets.yaml (gitignored), fill with
# strong, freshly-generated values, apply with `kubectl apply -f`, then move the
# corresponding keys OUT of the ConfigMap `lms-go-common` and reference this
# Secret from each Deployment via envFrom (see hardening.yaml).
#
# Generate strong values:
#   JWT_SECRET                 : openssl rand -base64 48   (>= 32 decoded bytes — enforced by code)
#   LMS_INTERNAL_SERVICE_KEY   : openssl rand -hex 32      (ROTATE: the old key is committed/burned)
#   DB password / RabbitMQ     : openssl rand -base64 24
#   LMS_AUTH_*_PASSWORD        : per-account strong passwords (or remove to disable the account)
#
# Rotation notes:
# - Rotating JWT_SECRET invalidates live tokens (users re-login) — roll all
#   services together.
# - Rotating LMS_INTERNAL_SERVICE_KEY must be done across ALL services at once
#   (they must agree). The gateway no longer accepts it (CRIT-1 fix), so this key
#   is now only for in-cluster service-to-service calls.
apiVersion: v1
kind: Secret
metadata:
  name: lms-secrets
  namespace: lms
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_openssl_rand_base64_48"
  LMS_INTERNAL_SERVICE_KEY: "REPLACE_openssl_rand_hex_32"
  DB_PASSWORD: "REPLACE_strong_db_password"
  RABBITMQ_PASSWORD: "REPLACE_strong_rabbitmq_password"
  # Per-account login passwords (production sets these; omit LMS_AUTH_ALLOW_DEFAULT_PASSWORDS).
  LMS_AUTH_ADMIN_PASSWORD: "REPLACE_strong_admin_password"
  LMS_AUTH_MANAGER_PASSWORD: "REPLACE_strong_manager_password"
  LMS_AUTH_OFFICER_PASSWORD: "REPLACE_strong_officer_password"
  # LMS_AUTH_TELLER_PASSWORD: omit to disable the teller account
