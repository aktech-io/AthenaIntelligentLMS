{{- if not .Values.global.existingSecret }}
# Demo credentials — production must set global.existingSecret instead.
apiVersion: v1
kind: Secret
metadata:
  name: nemo-credentials
  labels: {{- include "nemo.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.demoCredentials.jwtSecret | quote }}
  LMS_INTERNAL_SERVICE_KEY: {{ .Values.demoCredentials.internalServiceKey | quote }}
  DB_USER: {{ .Values.demoCredentials.dbUser | quote }}
  DB_PASSWORD: {{ .Values.demoCredentials.dbPassword | quote }}
  RABBITMQ_USER: {{ .Values.demoCredentials.rabbitmqUser | quote }}
  RABBITMQ_PASSWORD: {{ .Values.demoCredentials.rabbitmqPassword | quote }}
{{- end }}
