{{- if .Values.rabbitmq.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nemo-rabbitmq
  labels: {{- include "nemo.labels" . | nindent 4 }}
spec:
  serviceName: nemo-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: nemo-rabbitmq
  template:
    metadata:
      labels:
        app: nemo-rabbitmq
        {{- include "nemo.labels" . | nindent 8 }}
    spec:
      containers:
        - name: rabbitmq
          image: {{ .Values.rabbitmq.image }}
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef: {name: {{ include "nemo.secretName" . }}, key: RABBITMQ_USER}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef: {name: {{ include "nemo.secretName" . }}, key: RABBITMQ_PASSWORD}
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.rabbitmq.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: nemo-rabbitmq
  labels: {{- include "nemo.labels" . | nindent 4 }}
spec:
  selector:
    app: nemo-rabbitmq
  ports:
    - name: amqp
      port: 5672
    - name: management
      port: 15672
{{- end }}
