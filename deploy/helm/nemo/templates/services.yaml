{{- $root := . -}}
{{- range .Values.services }}
{{- $svc := . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-{{ $svc.name }}
  labels:
    app: go-{{ $svc.name }}
    {{- include "nemo.labels" $root | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default $root.Values.serviceDefaults.replicas }}
  selector:
    matchLabels:
      app: go-{{ $svc.name }}
  template:
    metadata:
      labels:
        app: go-{{ $svc.name }}
        {{- include "nemo.labels" $root | nindent 8 }}
    spec:
      containers:
        - name: {{ $svc.name }}
          image: {{ include "nemo.serviceImage" (list $root $svc) }}
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef: {name: nemo-common}
            - secretRef: {name: {{ include "nemo.secretName" $root }}}
          env:
            - name: SERVICE_NAME
              value: go-{{ $svc.name }}
            - name: PORT
              value: {{ $svc.port | quote }}
            {{- if $svc.dbName }}
            - name: DB_NAME
              value: {{ $svc.dbName | quote }}
            {{- end }}
            - name: RABBITMQ_CONSUME_ENABLED
              value: {{ $root.Values.serviceDefaults.consumeEnabled | quote }}
            {{- range $k, $v := $svc.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet: {path: /actuator/health, port: {{ $svc.port }}}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /actuator/health, port: {{ $svc.port }}}
            initialDelaySeconds: 30
            periodSeconds: 15
          resources: {{- ($svc.resources | default $root.Values.serviceDefaults.resources) | toYaml | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: go-{{ $svc.name }}
  labels:
    app: go-{{ $svc.name }}
    {{- include "nemo.labels" $root | nindent 4 }}
spec:
  selector:
    app: go-{{ $svc.name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- end }}
