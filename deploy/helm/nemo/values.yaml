# Nemo umbrella chart — default values.
# Defaults give a self-contained single-node install (in-cluster PostgreSQL and
# RabbitMQ, demo-grade resources). Production: set global.existingSecret, point
# db/rabbitmq at managed instances, and raise replicas/resources — see
# values-prod-example.yaml notes in the chart README.

global:
  imageRegistry: ""            # e.g. registry.example.com/nemo — empty = local images
  imageTag: latest
  imagePullPolicy: IfNotPresent
  # Market pack (C2): ISO country code of the deployment's market.
  marketPack: KE
  # Name of an existing Secret carrying JWT_SECRET, LMS_INTERNAL_SERVICE_KEY,
  # DB_USER, DB_PASSWORD, RABBITMQ_USER, RABBITMQ_PASSWORD. When empty the
  # chart renders its own Secret from the demo values below (NOT for prod).
  existingSecret: ""

# Demo-grade credentials, used only when global.existingSecret is empty.
demoCredentials:
  jwtSecret: "nemo-demo-jwt-secret-change-me-0000000000"
  internalServiceKey: "nemo-demo-internal-key"
  dbUser: athena
  dbPassword: athena_secret
  rabbitmqUser: athena
  rabbitmqPassword: athena_secret

db:
  host: ""                     # empty = in-cluster postgres service
  port: 5432
  sslMode: disable

rabbitmq:
  host: ""                     # empty = in-cluster rabbitmq service
  port: 5672
  vhost: "/"
  enabled: true                # in-cluster broker
  image: rabbitmq:3.13-management-alpine
  storage: 2Gi

postgresql:
  enabled: true                # in-cluster database
  image: postgres:16-alpine
  storage: 8Gi

# Production hardening (D4 baseline): per-service PDB + HPA and a
# default-deny ingress NetworkPolicy (same-namespace traffic only — expose
# only the gateway). HPA needs metrics-server; NetworkPolicy needs an
# enforcing CNI.
hardening:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilization: 70

# D3 zero-downtime upgrades: gated=true runs migrations in pre-upgrade hook
# Jobs (MIGRATE_ONLY) and pods skip startup migrations — a failed migration
# blocks the rollout instead of racing it. Recommended for production.
migrations:
  gated: false

serviceDefaults:
  replicas: 1
  migrateOnStartup: true
  consumeEnabled: true
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: 500m, memory: 256Mi}

# The Go services (16 LMS + 4 mobile BFF). image defaults to
# <registry>/nemo-<name>:<tag>. routeKey generates the gateway's
# ROUTE_<KEY>_URL env.
services:
  - {name: account-service,          port: 8086, dbName: athena_accounts,      routeKey: ACCOUNT_SERVICE}
  - {name: product-service,          port: 8087, dbName: athena_products,      routeKey: PRODUCT_SERVICE}
  - {name: loan-origination-service, port: 8088, dbName: athena_loans,         routeKey: LOAN_ORIGINATION_SERVICE}
  - {name: loan-management-service,  port: 8089, dbName: athena_loans,         routeKey: LOAN_MANAGEMENT_SERVICE}
  - {name: payment-service,          port: 8090, dbName: athena_payments,      routeKey: PAYMENT_SERVICE}
  - {name: accounting-service,       port: 8091, dbName: athena_accounting,    routeKey: ACCOUNTING_SERVICE}
  - {name: float-service,            port: 8092, dbName: athena_float,         routeKey: FLOAT_SERVICE}
  - {name: collections-service,      port: 8093, dbName: athena_collections,   routeKey: COLLECTIONS_SERVICE}
  - {name: compliance-service,       port: 8094, dbName: athena_compliance,    routeKey: COMPLIANCE_SERVICE}
  - {name: reporting-service,        port: 8095, dbName: athena_reporting,     routeKey: REPORTING_SERVICE}
  - {name: ai-scoring-service,       port: 8096, dbName: athena_scoring,       routeKey: AI_SCORING_SERVICE}
  - {name: overdraft-service,        port: 8097, dbName: athena_overdraft,     routeKey: OVERDRAFT_SERVICE}
  - {name: media-service,            port: 8098, dbName: athena_media,         routeKey: MEDIA_SERVICE}
  - {name: notification-service,     port: 8099, dbName: athena_notifications}
  - name: fraud-detection-service
    port: 8100
    dbName: athena_fraud
    routeKey: FRAUD_DETECTION_SERVICE
    extraEnv:
      FRAUD_ML_SERVICE_URL: http://nemo-fraud-ml:8101
  # Decision spine control plane (E1): projects decision.recorded events into
  # the append-only decision_log. Gateway route lands with E1 increment 4.
  - {name: decision-service, port: 8106, dbName: athena_decision}

  # Mobile BFF services (Nemo A1 Phase 0 — folded in from AthenaMobileWallet).
  # Deliberately NO routeKey: these are app-facing, not gateway-routed. The
  # Flutter app authenticates against them directly (OTP/PIN/JWT for
  # customers) and they call INTO go-lms-api-gateway with X-Service-Key —
  # putting them behind the staff/service gateway would invert that trust
  # boundary and double-wrap auth. External exposure (ingress paths or the
  # legacy 3010x NodePorts) is part of the D1 exposure work; in-cluster they
  # are plain ClusterIP services like everything else.
  - name: bff-gateway
    port: 8110
    dbName: athena_mobile_gateway
    extraEnv:
      ACCOUNT_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      OVERDRAFT_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      PAYMENT_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      PRODUCT_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      LOAN_ORIGINATION_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      LOAN_MANAGEMENT_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      AI_SCORING_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      # A2 onboarding: direct service URLs — the public lms-api-gateway strips
      # X-Service-Key headers (CRIT-1), so service-key calls must not transit it.
      COMPLIANCE_SERVICE_URL: http://go-compliance-service:8094
      MEDIA_SERVICE_URL: http://go-media-service:8098
      NOTIFICATION_SERVICE_URL: http://go-bff-notification:8111
  - name: bff-notification
    port: 8111
    dbName: athena_bff_notifications
  - name: bff-billpay-savings
    port: 8112
    dbName: athena_billpay_savings
    extraEnv:
      ACCOUNT_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      PAYMENT_SERVICE_URL: http://go-lms-api-gateway:8105/lms
  - name: bff-shop
    port: 8113
    dbName: athena_shop
    extraEnv:
      ACCOUNT_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      PAYMENT_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      LOAN_ORIGINATION_SERVICE_URL: http://go-lms-api-gateway:8105/lms
      AI_SCORING_SERVICE_URL: http://go-lms-api-gateway:8105/lms

gateway:
  name: lms-api-gateway
  port: 8105
  replicas: 1
  ingress:
    enabled: false
    className: ""
    host: nemo.local
    tls: []

fraudMl:
  enabled: true
  image: ""                    # defaults to <registry>/nemo-fraud-ml:<tag>
  port: 8101
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 1Gi}

portal:
  enabled: false               # back-office UI; needs a built nginx image
  image: ""                    # defaults to <registry>/nemo-portal:<tag>
  port: 80

# Observability in the box (H1/H2/H3): Prometheus scrapes every annotated pod
# in the release namespace and evaluates the Nemo business alert pack;
# Grafana ships with the money-path dashboard provisioned.
observability:
  # When set (e.g. http://otel-collector:4318), every service exports OTLP
  # traces there; empty disables tracing (H1).
  otlpEndpoint: ""
  prometheus:
    enabled: true
    image: prom/prometheus:v2.53.0
    retention: 15d
    scrapeInterval: 30s
    storage: ""                # empty = emptyDir (demo); set e.g. 20Gi for a PVC
  alertmanager:
    enabled: false             # enable once a receiver below points somewhere real
    image: prom/alertmanager:v0.27.0
    # Raw alertmanager.yml content (H3). The default tree routes by severity:
    # critical pages immediately and repeats hourly; warning batches to the
    # ops channel. Replace the receiver stubs with your PagerDuty/Slack/email
    # endpoints — every alert in the Nemo pack carries a severity label.
    config: |
      route:
        receiver: ops-channel
        group_by: [alertname, job]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - matchers: [severity = critical]
            receiver: oncall-page
            group_wait: 0s
            repeat_interval: 1h
      receivers:
        - name: oncall-page
          # PagerDuty: add pagerduty_configs with your routing_key, or point
          # webhook_configs at your paging bridge.
          webhook_configs:
            - url: http://alert-bridge.internal/page
              send_resolved: true
        - name: ops-channel
          # Slack: add slack_configs with api_url + channel; email works too.
          webhook_configs:
            - url: http://alert-bridge.internal/ops
              send_resolved: true
  grafana:
    enabled: true
    image: grafana/grafana:11.1.0
    adminPassword: nemo-admin  # demo only; override in production
