  # ─── Mobile BFF services (Nemo A1 Phase 0 — folded in from AthenaMobileWallet) ──
  # App-facing: the Flutter app calls these directly (they are NOT routed
  # through lms-api-gateway; they call INTO it with X-Service-Key). Host ports
  # follow the 28xxx convention; the 3010x mappings mirror the k3s NodePorts
  # the unchanged Flutter app is hardcoded to (localhost:30100-30103).
  go-bff-gateway:
    build:
      context: ./go-services
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: bff-gateway
    ports: ["28110:8110", "30100:8110"]
    environment:
      <<: *go-env
      PORT: 8110
      DB_HOST: postgres
      DB_NAME: athena_mobile_gateway
      SERVICE_NAME: go-bff-gateway
      ACCOUNT_SERVICE_URL: http://go-account-service:8086
      OVERDRAFT_SERVICE_URL: http://go-overdraft-service:8097
      PAYMENT_SERVICE_URL: http://go-payment-service:8090
      PRODUCT_SERVICE_URL: http://go-product-service:8087
      LOAN_ORIGINATION_SERVICE_URL: http://go-loan-origination-service:8088
      LOAN_MANAGEMENT_SERVICE_URL: http://go-loan-management-service:8089
      AI_SCORING_SERVICE_URL: http://go-ai-scoring-service:8096
      # A2 onboarding: direct service URLs — the public lms-api-gateway strips
      # X-Service-Key headers (CRIT-1), so service-key calls must not transit it.
      COMPLIANCE_SERVICE_URL: "http://go-compliance-service:8094"
      MEDIA_SERVICE_URL: "http://go-media-service:8098"
      NOTIFICATION_SERVICE_URL: "http://go-bff-notification:8111"
    depends_on:
      postgres:
        condition: service_healthy
