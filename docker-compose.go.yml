# Docker Compose overlay for Go services coexistence.
# Run: docker compose -f docker-compose.lms.yml -f docker-compose.go.yml up
#
# Go services run on 28xxx host ports during migration.
# RABBITMQ_CONSUME_ENABLED=false prevents duplicate event processing.

x-go-env: &go-env
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: ${RABBITMQ_USER:-athena}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-athena_secret}
  JWT_SECRET: ${JWT_SECRET}
  LMS_INTERNAL_SERVICE_KEY: ${LMS_INTERNAL_SERVICE_KEY:-athena-internal-key}
  DB_USER: ${POSTGRES_USER:-athena}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-athena_secret}

services:
  go-account-service:
    build:
      context: ./go-services
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: account-service
    ports: ["28086:8086"]
    environment:
      <<: *go-env
      PORT: 8086
      DB_HOST: postgres
      DB_NAME: athena_accounts
      SERVICE_NAME: go-account-service
      RABBITMQ_CONSUME_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [athena-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  go-product-service:
    build:
      context: ./go-services
      dockerfile: deploy/docker/Dockerfile.service
